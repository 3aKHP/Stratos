name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract the block between "## [VERSION]" and the next "## [" header
          NOTES=$(awk -v ver="$VERSION" '
            BEGIN { found=0 }
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md)
          # Write to file to avoid escaping issues
          echo "$NOTES" > /tmp/release-notes.md
          echo "NOTES_FILE=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingAlias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_signingKeyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Stratos v${{ steps.version.outputs.VERSION }}
          body_path: ${{ steps.changelog.outputs.NOTES_FILE }}
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
